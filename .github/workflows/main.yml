name: DeepAI Anime Automation Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Chrome and Dependencies
        run: |
          pip install selenium webdriver-manager requests

      - name: Run DeepAI Automation Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python main.py

      # YEH NAYA STEP HAI (Screenshots save karne ke liye)
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always() # Yeh line zaroori hai taaki error aane par bhi photo save ho
        with:
          name: automation-screenshots
          path: output_images/
