name: DeepAI Anime Automation Bot

on:
  workflow_dispatch: # Manual button se chalane ke liye
  schedule:
    - cron: '0 */3 * * *' # Har 3 ghante mein auto-run hoga

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Chrome and Dependencies
        run: |
          # Chrome browser GitHub runner mein pehle se hota hai
          # Hume bas Selenium aur baki libraries install karni hain
          pip install selenium webdriver-manager requests

      - name: Run DeepAI Automation Script
        env:
          # Inhe GitHub Secrets mein add karna zaroori hai
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python bot.py
