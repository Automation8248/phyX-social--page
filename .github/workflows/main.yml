name: DeepAI Anime Automation Bot

on:
  workflow_dispatch: # Manual run ke liye (Jab aap khud chalana chahein)
  schedule:
    - cron: '0 3,15 * * *' # Din mein 2 baar: Subah 8:30 AM aur Raat 8:30 PM (IST)

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Chrome and Dependencies
        run: |
          # Headless Selenium aur baki zaroori libraries setup karna
          pip install selenium webdriver-manager requests

      - name: Run DeepAI Automation Script
        env:
          # Github Actions Secrets me aapki keys (Inhe change ya delete mat karna)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python main.py

      # ARTIFACT SUPPORT FOR DEBUGGING (Screenshots save karne ke liye - 100% zaroori)
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always() # Script pass ho ya fail, dono halat me screenshots save karega
        with:
          name: automation-screenshots
          path: output_images/
