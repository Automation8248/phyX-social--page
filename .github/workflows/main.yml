name: DeepAI Anime Automation Bot

on:
  workflow_dispatch: # Manual run ke liye
  schedule:
    - cron: '0 */3 * * *' # Every 3 hours automatically runs

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Chrome and Dependencies
        run: |
          # Headless Selenium setup
          pip install selenium webdriver-manager requests

      - name: Run DeepAI Automation Script
        env:
          # Github Actions Secrets me zaroor add karein
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python main.py

      # ARTIFACT SUPPORT FOR DEBUGGING (Important based on previous failures)
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always() # Runs even if the previous step failed to capture the error state screenshot
        with:
          name: automation-screenshots
          path: output_images/
